*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;background:#0d1117;color:#e6edf3;line-height:1.5;font-size:13px}
.wrap{max-width:1140px;margin:0 auto;padding:16px 20px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:700;background:linear-gradient(90deg,#00d4aa,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:11px;color:#6e7681}
.glow{height:1px;background:linear-gradient(90deg,transparent,#00d4aa,transparent);margin-bottom:16px;opacity:.4}
.clock{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#00d4aa;letter-spacing:2px}
.conn{font-size:11px;color:#3fb950}
.conn::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950;margin-right:5px;vertical-align:middle}
.tabs{display:flex;border-bottom:1px solid #30363d;margin-bottom:16px;overflow-x:auto}
.tabs button{padding:10px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:#6e7681;border-bottom:2px solid transparent;white-space:nowrap}
.tabs button:hover{color:#8b949e}
.tabs button.on{color:#00d4aa;font-weight:500;border-bottom-color:#00d4aa;text-shadow:0 0 10px rgba(0,212,170,.3)}
.PNL{display:none}.PNL.on{display:block}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#161b22;border-radius:10px;padding:16px 18px;border:1px solid #30363d;position:relative}
.kpi .lb{font-size:11px;color:#8b949e;margin-bottom:6px}
.kpi .nm{font-family:'Orbitron',monospace;font-size:28px;font-weight:700;letter-spacing:1px}
.kpi .dt{font-size:10px;margin-top:6px;display:inline-block;padding:2px 8px;border-radius:4px}
.k1 .nm{color:#ff6b6b;text-shadow:0 0 14px rgba(255,107,107,.3)}
.k2 .nm{color:#ffc107;text-shadow:0 0 14px rgba(255,193,7,.3)}
.k3 .nm{color:#bc8cff;text-shadow:0 0 14px rgba(188,140,255,.3)}
.k4 .nm{color:#3fb950;text-shadow:0 0 14px rgba(63,185,80,.3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.crd{background:#161b22;border-radius:10px;padding:16px;border:1px solid #30363d}
.ct{font-size:13px;font-weight:500;margin-bottom:10px}
.ct::before{content:'';display:inline-block;width:3px;height:13px;border-radius:2px;background:#00d4aa;margin-right:8px;vertical-align:middle}
.cb{position:relative;height:220px}
#mapDiv{height:400px;border-radius:10px;border:1px solid #30363d;margin-bottom:18px;background:#161b22}
.mc{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mc button{padding:4px 14px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #30363d;background:#1c2333;color:#8b949e}
.mc button:hover{border-color:#484f58;color:#e6edf3}
.mc button.on{border-color:#00d4aa;background:rgba(0,212,170,.08);color:#00d4aa;box-shadow:0 0 8px rgba(0,212,170,.12)}
.sb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sb input[type=text]{flex:1;min-width:180px;padding:8px 14px;border:1px solid #30363d;border-radius:8px;font-size:12px;background:#1c2333;color:#e6edf3;outline:none}

.rc{font-size:11px;color:#6e7681;margin-bottom:6px}
table{width:100%;border-collapse:separate;border-spacing:0;background:#161b22;border-radius:10px;overflow:hidden;border:1px solid #30363d}
thead th{background:#21283b;color:#8b949e;padding:10px 14px;font-size:11px;font-weight:500;text-align:left;white-space:nowrap;border-bottom:1px solid #30363d}
tbody td{padding:8px 14px;font-size:12px;border-bottom:1px solid rgba(48,54,61,.4);color:#e6edf3}

.tg{display:inline-block;padding:2px 10px;border-radius:5px;font-size:10px;font-weight:500;white-space:nowrap}

.trb{margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid #30363d}
.trb label{font-size:10px;color:#6e7681;display:block;margin-bottom:2px}
.trb input,.trb select,.trb textarea{width:100%;padding:6px 10px;font-size:11px;border:1px solid #30363d;border-radius:6px;background:#1c2333;color:#e6edf3;outline:none}
.trb input:focus,.trb select:focus,.trb textarea:focus{border-color:#00d4aa}
.trb textarea{min-height:36px;resize:vertical}.trf{grid-column:1/-1}
.eb{font-size:10px;padding:3px 12px;border-radius:5px;cursor:pointer;border:1px solid #30363d;background:#1c2333;color:#8b949e}
.eb:hover{border-color:#00d4aa;color:#00d4aa}
.sph{padding:8px 14px;border-radius:8px;background:#1c2333;font-weight:600;font-size:12px;margin:12px 0 8px}
.sst{display:flex;gap:10px;padding:5px 0 5px 16px;font-size:12px;color:#8b949e}
.sst b{font-weight:500;color:#e6edf3}
.ssl{min-width:24px;font-weight:700;flex-shrink:0}
.inb{padding:12px 16px;border-radius:8px;background:rgba(0,212,170,.06);border-left:3px solid #00d4aa;font-size:11px;color:#00d4aa;line-height:1.6;margin-top:14px}
.rkr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;margin-bottom:3px;font-size:12px;background:#1c2333;border:1px solid #30363d;cursor:pointer}
.rkr:hover{border-color:#484f58}
.rkn{font-weight:500;min-width:50px}.rkb{flex:1;height:16px;background:#21283b;border-radius:3px;overflow:hidden}
.rkf{height:100%;border-radius:3px}.rkv{min-width:70px;text-align:right;font-size:11px;color:#8b949e}
.pbtn{position:fixed;bottom:20px;right:20px;padding:10px 24px;background:linear-gradient(135deg,#00d4aa,#58a6ff);color:#0d1117;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(0,212,170,.3);z-index:999}
.pbtn:hover{opacity:.9}
#printArea{display:none}
@media print{
body{background:#fff!important;color:#222!important}
.wrap{padding:10px;max-width:100%}
.tabs,.sb,.mc,.eb,.pbtn,.glow{display:none!important}
.PNL{display:none!important}
#printArea{display:block!important;background:#fff!important}
#printArea *{color:#222!important;border-color:#ccc!important}
#printArea .kpi{background:#f5f5f5!important;border:1px solid #ccc!important}
#printArea .kpi .nm{text-shadow:none!important;-webkit-text-fill-color:#222!important;background:none!important}
#printArea table{background:#fff!important}
#printArea thead th{background:#eee!important;color:#222!important}
#mapDiv{display:none!important}
}
@media(max-width:768px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.trb{grid-template-columns:1fr 1fr}}
</style>

function initMap(){
  if(mapObj)return;
  if(typeof L==="undefined"){document.getElementById("mapDiv").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:400px;color:#8b949e;text-align:center;padding:20px">地圖需要網路連線載入外部資源</div>';return}
  mapObj=L.map("mapDiv").setView([25.042,121.545],12);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"CartoDB"}).on("tileerror",function(){
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapObj);
    }).addTo(mapObj);
  setTimeout(function(){mapObj.invalidateSize()},300);
  var hc=[];D.forEach(function(d){if(d.t!=="valid"&&d.lat)hc.push([d.lat,d.lng,.8])});
  heatLayer=L.heatLayer(hc,{radius:25,blur:15,maxZoom:17,gradient:{0.2:"#58a6ff",0.4:"#00d4aa",0.6:"#ffc107",0.8:"#ff6b6b",1:"#ff4444"}});
  showMarkers("all");
  // Build map control buttons
  var types=[["all","全部"],["not_found","未登記"],["expired","已過期"],["expiring","即將到期"],["valid","合規"],["heat","熱點分析"]];
  var ctrl=document.getElementById("mapCtrl");
  types.forEach(function(t){
    var btn=document.createElement("button");
    btn.textContent=t[1];btn.setAttribute("data-mf",t[0]);
    if(t[0]==="all")btn.className="on";
    btn.addEventListener("click",function(){
      var val=this.getAttribute("data-mf");
      if(val==="heat"){heatOn=!heatOn;if(heatOn)heatLayer.addTo(mapObj);else mapObj.removeLayer(heatLayer);this.classList.toggle("on")}
      else{ctrl.querySelectorAll("button").forEach(function(b){if(b.getAttribute("data-mf")!=="heat")b.classList.remove("on")});this.classList.add("on");showMarkers(val)}
    });
    ctrl.appendChild(btn);
  });
}
function showMarkers(filter){
  if(!mapObj)return;
  mapMarkers.forEach(function(m){mapObj.removeLayer(m)});mapMarkers=[];
  var list=filter==="all"?D:D.filter(function(d){return d.t===filter});
  list.forEach(function(d){
    if(!d.lat)return;
    var c=MC[d.t]||"#888";
    var icon=L.divIcon({className:"",html:'<div style="width:12px;height:12px;border-radius:50%;background:'+c+';border:2px solid rgba(13,17,23,.8);box-shadow:0 0 8px '+c+'80"></div>',iconSize:[12,12],iconAnchor:[6,6]});
    var m=L.marker([d.lat,d.lng],{icon:icon}).addTo(mapObj);
    m.bindPopup('<div style="font-size:12px;line-height:1.6;min-width:200px"><b>'+d.n+'</b><br>'+d.d+' | '+TL[d.t]+(d.m?'<br>登記：'+d.m:'')+(d.e?'<br>到期：'+d.e:'')+(d.o?'<br>經營者：'+d.o:'')+'</div>');
    mapMarkers.push(m);
  });
}

var detH='<div class="sb"><input type="text" id="sq" placeholder="搜尋停車場名稱、經營者、行政區..."><select id="ft"><option value="all">全部類型</option><option value="not_found">未登記</option><option value="expired">已過期</option><option value="expiring">即將到期</option><option value="valid">合規有效</option></select><select id="fv"><option value="all">全部</option><option value="yes">僅違規</option><option value="no">僅合規</option></select></div><div class="rc" id="rc2"></div><table><thead><tr><th>USPACE 名稱</th><th>行政區</th><th>違規類型</th><th>登記名稱</th><th>到期日</th><th>經營者</th><th>配對</th></tr></thead><tbody id="tb2"></tbody></table>';
document.getElementById("pDetail").innerHTML=detH;

function renderTable(){
  var q=document.getElementById("sq").value.toLowerCase();
  var ft=document.getElementById("ft").value;
  var fv=document.getElementById("fv").value;
  var list=D.slice();
  if(q)list=list.filter(function(d){return d.n.toLowerCase().indexOf(q)>=0||d.d.indexOf(q)>=0||(d.m&&d.m.toLowerCase().indexOf(q)>=0)||(d.o&&d.o.toLowerCase().indexOf(q)>=0)});
  if(ft!=="all")list=list.filter(function(d){return d.t===ft});
  if(fv==="yes")list=list.filter(function(d){return d.t!=="valid"});
  if(fv==="no")list=list.filter(function(d){return d.t==="valid"});
  document.getElementById("rc2").textContent="顯示 "+list.length+" / "+D.length+" 筆";
  var h="";list.forEach(function(r){h+='<tr><td style="font-weight:500">'+r.n+'</td><td>'+r.d+'</td><td><span class="tg '+TC[r.t]+'">'+TL[r.t]+'</span></td><td>'+(r.m||'<span style="color:#ff6b6b">—</span>')+'</td><td>'+(r.e||"—")+'</td><td>'+(r.o||"—")+'</td><td style="text-align:center">'+r.s+'%</td></tr>'});
  document.getElementById("tb2").innerHTML=h;
}
document.getElementById("sq").addEventListener("input",renderTable);
document.getElementById("ft").addEventListener("change",renderTable);
document.getElementById("fv").addEventListener("change",renderTable);
renderTable();

// ===== TRACKING =====
function renderTrack(){
  var cn={};STS.forEach(function(s){cn[s.k]=0});ts.forEach(function(c){cn[c.st]=(cn[c.st]||0)+1});
  var fl=trackFilt==="all"?ts:ts.filter(function(c){return c.st===trackFilt});
  var fh='<div class="mc">';
  fh+='<button class="'+(trackFilt==="all"?"on":"")+'" data-tf="all">全部 ('+ts.length+')</button>';
  STS.forEach(function(s){fh+='<button class="'+(trackFilt===s.k?"on":"")+'" data-tf="'+s.k+'">'+s.l+' ('+(cn[s.k]||0)+')</button>'});
  fh+='</div><div id="tlst"></div>';
  document.getElementById("pTrack").innerHTML=fh;
  // Filter buttons
  document.querySelectorAll("#pTrack .mc button").forEach(function(btn){
    btn.addEventListener("click",function(){trackFilt=this.getAttribute("data-tf");renderTrack()});
  });
  // Track list
  var h="";
  fl.forEach(function(c){
    var isOpen=openId===c.id;var col=SC[c.st]||"#888";
    h+='<div class="tri" style="border-left:3px solid '+col+'" data-tid="'+c.id+'">';
    h+='<div class="trh"><div><span class="trn">'+c.n+'</span><span class="trm">'+c.d+'</span>'+(c.e?'<span class="trm">到期 '+c.e+'</span>':'')+'</div>';
    h+='<div style="display:flex;align-items:center;gap:6px"><span class="tg" style="background:'+col+'18;color:'+col+'">'+SL[c.st]+'</span><button class="eb">'+(isOpen?"收合":"編輯")+'</button></div></div>';
    if(isOpen){
      h+='<div class="trb">';
      h+='<div><label>處理狀態</label><select data-f="st">';STS.forEach(function(s){h+='<option value="'+s.k+'"'+(c.st===s.k?" selected":"")+'>'+s.l+'</option>'});h+='</select></div>';
      h+='<div><label>發函日期</label><input type="date" value="'+c.nd+'" data-f="nd"></div>';
      h+='<div><label>改善期限</label><input type="date" value="'+c.dl+'" data-f="dl"></div>';
      h+='<div><label>複查結果</label><select data-f="cr"><option value="">尚未複查</option><option'+(c.cr==="已重新申請登記證"?" selected":"")+'>已重新申請登記證</option><option'+(c.cr==="已停止違規營業"?" selected":"")+'>已停止違規營業</option><option'+(c.cr==="仍持續違規營業"?" selected":"")+'>仍持續違規營業</option><option'+(c.cr==="部分改善"?" selected":"")+'>部分改善</option></select></div>';
      h+='<div><label>開罰日期</label><input type="date" value="'+c.fd+'" data-f="fd"></div>';
      h+='<div><label>罰款金額</label><input type="text" value="'+c.amt+'" placeholder="例：50,000" data-f="amt"></div>';
      h+='<div><label>處理人</label><input type="text" value="'+c.hd+'" data-f="hd"></div><div></div>';
      h+='<div class="trf"><label>備註</label><textarea data-f="nt">'+c.nt+'</textarea></div></div>';
    }
    h+='</div>';
  });
  document.getElementById("tlst").innerHTML=h;
  // Bind
  document.querySelectorAll(".tri .trh").forEach(function(el){
    el.addEventListener("click",function(){var tid=parseInt(this.closest(".tri").getAttribute("data-tid"));openId=openId===tid?null:tid;renderTrack()});
  });
  document.querySelectorAll(".trb input,.trb select,.trb textarea").forEach(function(el){
    el.addEventListener("change",function(){var tid=parseInt(this.closest(".tri").getAttribute("data-tid"));var f=this.getAttribute("data-f");var v=this.value;ts.forEach(function(c){if(c.id===tid)c[f]=v})});
  });
}
renderTrack();
